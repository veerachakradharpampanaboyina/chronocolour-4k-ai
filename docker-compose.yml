# ============================================================
# ChronoColor 4K AI — Docker Compose (Development)
# ============================================================

services:
  # ---- API Server ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronocolor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model-weights:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - chronocolor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- GPU Worker ----
  worker-gpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: chronocolor-worker-gpu
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model-weights:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - chronocolor-net
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=gpu,default
      --hostname=gpu-worker@%h

  # ---- CPU Worker ----
  worker-cpu:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronocolor-worker-cpu
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model-weights:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chronocolor-net
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=cpu,default
      --hostname=cpu-worker@%h

  # ---- Celery Beat (Scheduler) ----
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronocolor-beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chronocolor-net
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info

  # ---- Flower (Task Monitor) ----
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronocolor-flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chronocolor-net
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --broker_api=redis://redis:6379/0

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chronocolor-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api
    networks:
      - chronocolor-net
    restart: unless-stopped

  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: chronocolor-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chronocolor
      MONGO_INITDB_ROOT_PASSWORD: chronocolor_secret
    volumes:
      - mongodb-data:/data/db
    networks:
      - chronocolor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: chronocolor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chronocolor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ---- MinIO (S3-Compatible Storage) ----
  minio:
    image: minio/minio:latest
    container_name: chronocolor-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: chronocolor_access
      MINIO_ROOT_PASSWORD: chronocolor_secret_key
    volumes:
      - minio-data:/data
    networks:
      - chronocolor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"

volumes:
  mongodb-data:
  redis-data:
  minio-data:
  model-weights:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./models

networks:
  chronocolor-net:
    driver: bridge

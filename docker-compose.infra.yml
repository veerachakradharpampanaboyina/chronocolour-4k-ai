# ============================================================
# ChronoColor 4K AI — Infrastructure Only (Local Development)
# ============================================================
# Starts only MongoDB, Redis, and MinIO for local development.
# FastAPI, workers, and frontend run on the host machine.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down
#   docker compose -f docker-compose.infra.yml logs -f
# ============================================================

services:
  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: chronocolor-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chronocolor
      MONGO_INITDB_ROOT_PASSWORD: chronocolor_secret
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: chronocolor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ---- MinIO (S3-Compatible Storage) ----
  minio:
    image: minio/minio:latest
    container_name: chronocolor-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: chronocolor_access
      MINIO_ROOT_PASSWORD: chronocolor_secret_key
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"

volumes:
  mongodb-data:
  redis-data:
  minio-data:
